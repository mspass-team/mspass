<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<meta name="generator" content="Doxygen $doxygenversion"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

$treeview

$mathjax

<script src="$relpath^striped_bg.js"></script>
$extrastylesheet
<script type="text/javascript">
(function () {
  function systemTheme() {
    if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
      return "dark";
    }
    return "light";
  }

  function applyTheme(theme) {
    var normalized = theme === "dark" || theme === "light" ? theme : systemTheme();
    document.documentElement.setAttribute("data-theme", normalized);
  }

  function notifyParentOfLocation() {
    if (window.parent === window) {
      return;
    }

    var path = window.location.pathname.split("/").pop() || "index.html";
    path += window.location.search + window.location.hash;
    window.parent.postMessage(
      { type: "mspass-doxygen-location", path: path },
      "*"
    );
  }

  applyTheme("auto");

  if (window.matchMedia) {
    var colorSchemeQuery = window.matchMedia("(prefers-color-scheme: dark)");
    var updateSystemTheme = function () { applyTheme("auto"); };
    if (colorSchemeQuery.addEventListener) {
      colorSchemeQuery.addEventListener("change", updateSystemTheme);
    } else if (colorSchemeQuery.addListener) {
      colorSchemeQuery.addListener(updateSystemTheme);
    }
  }

  window.addEventListener("message", function (event) {
    if (!event.data || event.data.type !== "mspass-doc-theme") {
      return;
    }
    applyTheme(event.data.theme);
  });

  window.addEventListener("load", notifyParentOfLocation);
  window.addEventListener("hashchange", notifyParentOfLocation);
})();
</script>
</head>

  </td>
