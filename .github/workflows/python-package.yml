name: Python package

"on":
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.13']

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: |
          pyproject.toml
          .github/workflows/python-package.yml
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    - name: Install CXX Dependencies
      run: sudo apt-get update && sudo apt-get install -yq cmake gfortran libboost-dev libboost-serialization-dev liblapack-dev
    - name: Install MongoDB
      uses: supercharge/mongodb-github-action@1.12.1
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade --upgrade-strategy eager \
          setuptools setuptools_scm wheel numpy cmake pytest pytest-cov
    - name: Install Spark Python Dependencies
      env:
        PYSPARK_HADOOP_VERSION: "3"
      run: |
        python -m pip install --upgrade --upgrade-strategy eager pyspark pytest-spark
        python - <<'PY'
        import os
        from pathlib import Path
        import pyspark

        spark_home = Path(pyspark.__file__).resolve().parent
        with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
            env_file.write(f"SPARK_HOME={spark_home}\n")
        with open(os.environ["GITHUB_PATH"], "a", encoding="utf-8") as path_file:
            path_file.write(f"{spark_home / 'bin'}\n")
        PY
    - name: Free up disk space
      run: |
        sudo apt-get clean
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h
    - name: Install
      env:
        MSPASS_CMAKE_BUILD_TYPE: Debug
      run: python -m pip install --no-cache-dir --no-build-isolation -v '.[seisbench]'
    - name: Test with pytest
      run: |
        export MSPASS_HOME=$(pwd)
        export SPARK_LOCAL_IP=127.0.0.1
        PYTHONUNBUFFERED=1 PYTHONFAULTHANDLER=1 pytest -vv --durations=25 --durations-min=1 --cov=mspasspy python/tests/
        make test -C build/temp.*/
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }} # required
        env_vars: OS,PYTHON
        verbose: true
    - name: Build Documentation
      if: ${{ matrix.python-version == '3.10' }}
      env:
        MSPASS_DOCS_SITE_URL: https://www.mspass.org
        MSPASS_DOCS_VERSION_MATCH: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
      run: |
        export MSPASS_HOME=$(pwd)
        sudo apt-get update && sudo apt-get install -yq doxygen graphviz pandoc
        pip install -r docs/requirements.txt
        cd docs
        SPHINXOPTS="-W --keep-going" MPLCONFIGDIR=/tmp/mspass-matplotlib make html
    - name: Prepare Documentation for GitHub Pages
      if: ${{ (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) && matrix.python-version == '3.10' }}
      env:
        MSPASS_DOCS_SITE_URL: https://www.mspass.org
        MSPASS_DOCS_VERSION_MATCH: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
      run: |
        python docs/scripts/prepare_versioned_docs.py \
          --html-dir docs/build/html \
          --site-dir docs/build/site \
          --site-url "$MSPASS_DOCS_SITE_URL" \
          --version-match "$MSPASS_DOCS_VERSION_MATCH"
    - name: Deploy to GitHub Pages
      if: ${{ (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) && matrix.python-version == '3.10' }}
      uses: JamesIves/github-pages-deploy-action@3.7.1
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BRANCH: gh-pages
        FOLDER: docs/build/site
        CLEAN: false
