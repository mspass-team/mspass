name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  schedule:
    - cron: '21 21 * * 5'
  push:
    branches: [ master ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ master ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  # Keep BuildKit cache out of GitHub Actions cache entries.
  CACHE_IMAGE: ghcr.io/${{ github.repository }}
  SPARK_VERSION: 3.0.0
  SPARK_ARCHIVE: spark-3.0.0-bin-hadoop2.7.tgz
  SPARK_URL: https://archive.apache.org/dist/spark/spark-3.0.0/spark-3.0.0-bin-hadoop2.7.tgz
  SPARK_SHA512: f5652835094d9f69eb3260e20ca9c2d58e8bdf85a8ed15797549a518b23c862b75a329b38d4248f8427e4310718238c60fae0f9d1afb3c70fb390d3e9cce2e49

jobs:
  download-spark:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Restore Spark archive cache
        id: spark-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.SPARK_ARCHIVE }}
          key: spark-${{ env.SPARK_ARCHIVE }}-${{ env.SPARK_SHA512 }}

      - name: Download Spark archive
        if: ${{ steps.spark-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          curl -fL --retry 5 --retry-all-errors --retry-delay 10 \
            --connect-timeout 20 --speed-limit 1024 --speed-time 60 --max-time 900 \
            -o "${SPARK_ARCHIVE}" "${SPARK_URL}"

      - name: Verify Spark archive
        shell: bash
        run: |
          set -euxo pipefail
          echo "${SPARK_SHA512}  ${SPARK_ARCHIVE}" | sha512sum -c -

      - name: Upload Spark build asset
        uses: actions/upload-artifact@v4
        with:
          name: spark-${{ env.SPARK_VERSION }}
          path: ${{ env.SPARK_ARCHIVE }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  build-latest:
    needs: download-spark
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf \
            "$AGENT_TOOLSDIRECTORY" \
            /opt/google/chrome \
            /opt/microsoft/msedge \
            /opt/microsoft/powershell \
            /opt/pipx \
            /usr/lib/mono \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Spark build asset
        uses: actions/download-artifact@v4
        with:
          name: spark-${{ env.SPARK_VERSION }}
          path: .docker-build-assets

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          flavor: |
            latest=true
          images: |
            mspass/mspass
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule,pattern=weekly
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr

      - name: Prepare amd64 manifest tags
        if: ${{ github.event_name != 'pull_request' }}
        id: amd64-tags
        shell: bash
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            echo "${tag}-amd64"
          done <<< "${{ steps.meta.outputs.tags }}" > amd64-tags.txt
          {
            echo 'tags<<EOF'
            cat amd64-tags.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build Docker image (amd64 only)
        uses: docker/build-push-action@v7
        if: ${{ github.event_name == 'pull_request' }}
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-contexts: |
            spark-build-assets=.docker-build-assets
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache-runtime-amd64

      - name: Build and push Docker image (amd64)
        uses: docker/build-push-action@v7
        if: ${{ github.event_name != 'pull_request' }}
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ${{ steps.amd64-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-contexts: |
            spark-build-assets=.docker-build-assets
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache-runtime-amd64
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache-runtime-amd64,mode=max

      - name: Prepare amd64 GeoLab tags
        id: amd64-geolab-tags
        shell: bash
        run: |
          cat <<'EOF' > amd64-geolab-tags.txt
          mspass/mspass:geolab-amd64
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:geolab-amd64
          EOF
          {
            echo 'tags<<EOF'
            cat amd64-geolab-tags.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build GeoLab image (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: geolab
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.amd64-geolab-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-contexts: |
            spark-build-assets=.docker-build-assets
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache-runtime-amd64

      - name: Build TACC image (amd64 only)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: tacc
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            mspass/mspass:tacc
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:tacc
          labels: ${{ steps.meta.outputs.labels }}
          build-contexts: |
            spark-build-assets=.docker-build-assets
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache-runtime-amd64

  build-latest-arm64:
    needs: download-spark
    runs-on: ubuntu-24.04-arm
