            mspass/mspass:dev-arm64
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-arm64

