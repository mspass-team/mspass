        if: ${{ github.event_name == 'pull_request' }}
        with:
          context: .
          target: mpi
          build-args: |
            MSPASS_BASE_IMAGE=ghcr.io/seisscoped/container-base:latest
          platforms: linux/amd64
          push: false
          tags: |
            mspass/mspass:mpi
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:mpi
