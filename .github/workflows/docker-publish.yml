          labels: ${{ steps.meta.outputs.labels }}
          build-contexts: |
            spark-build-assets=.docker-build-assets
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache-runtime-arm64

      - name: Build and push Docker image (arm64)
        uses: docker/build-push-action@v7
        if: ${{ github.event_name != 'pull_request' }}
        with:
          context: .
          target: runtime
          platforms: linux/arm64
          push: true
          tags: ${{ steps.arm64-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-contexts: |
            spark-build-assets=.docker-build-assets
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache-runtime-arm64
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache-runtime-arm64,mode=max

  publish-latest-manifest:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build-latest
      - build-latest-arm64
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          flavor: |
            latest=true
          images: |
            mspass/mspass
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule,pattern=weekly
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr

      - name: Create multi-arch manifests
        shell: bash
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              --tag "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"

  build-dev:
