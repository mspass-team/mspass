          context: .
          target: mpi
          build-args: |
            MSPASS_BASE_IMAGE=ghcr.io/seisscoped/container-base:latest
          platforms: linux/amd64
          push: true
          tags: |
            mspass/mspass:mpi
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:mpi
          labels: ${{ steps.meta.outputs.labels }}
          build-contexts: |
