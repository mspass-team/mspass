      - name: Prepare amd64 dev manifest tags
        id: amd64-dev-tags
        shell: bash
        run: |
          cat <<'EOF' > amd64-dev-tags.txt
          mspass/mspass:dev-amd64
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-amd64
          EOF
          {
            echo 'tags<<EOF'
            cat amd64-dev-tags.txt
